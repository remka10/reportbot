services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - reportbotnet
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - reports_data:/app/reports
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: reportbot
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # ВАЖНО: привязка к 127.0.0.1 — порт БД доступен ТОЛЬКО с localhost сервера,
      # НЕ из интернета. Подключение снаружи — только через SSH-туннель.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reportbotnet

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d reportbot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly — сохраняем состояние FSM на диск, чтобы оно переживало
    # перезапуск не только бота, но и самого redis.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - reportbotnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  nginx:

    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - reportbotnet

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

networks:
  reportbotnet:
    driver: bridge
    enable_ipv6: false

volumes:
  postgres_data:
  reports_data:
  redis_data:



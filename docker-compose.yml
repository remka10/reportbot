version: '3.9'

services:
  bot:
    build: .
    restart: unless-stopped
    network_mode: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - reports_data:/app/reports
      - ./app/templates:/app/templates:ro
    expose:
      - "8000"
    # ДОБАВЛЕНО: healthcheck для бота
    #healthcheck:
     # test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      #interval: 10s
      #timeout: 5s
      #retries: 5
      #start_period: 15s
     #networks:
    #- reportbot_net

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: reportbot
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
   # networks:
    #  - reportbot_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
   # ports:
    #  - "80:80"
     # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # ИСПРАВЛЕНО: nginx ждёт health бота
    depends_on:
      - bot
   # networks:
     # - reportbot_net

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:
  reports_data:

#networks:
 # reportbot_net:
  #  driver: bridge

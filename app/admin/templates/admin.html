<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeacherGen · Админ-панель</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#172033;--muted:#697386;--line:#e6e8ef;--brand:#5a88ff;--brand2:#242424;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--shadow:0 12px 35px rgba(20,30,55,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:#111827;color:#fff;padding:22px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#5a88ff,#c061f3);display:grid;place-items:center;font-size:22px}.brand b{display:block;font-size:18px}.brand span{color:#9ca3af;font-size:12px}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#d1d5db;text-align:left;padding:12px 14px;border-radius:12px;cursor:pointer;font-weight:650}.nav button:hover,.nav button.active{background:#1f2937;color:#fff}.main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.top h1{margin:0;font-size:28px}.top p{margin:4px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.input,.select,textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;color:var(--text);outline:none}.input:focus,.select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(90,136,255,.15)}.btn{border:0;border-radius:12px;background:var(--brand);color:#fff;padding:10px 14px;font-weight:750;cursor:pointer}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.danger{background:var(--bad)}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.metric{font-size:28px;font-weight:850}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.panel-head h2{margin:0;font-size:18px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line);background:#fbfcff}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#fbfcff;position:sticky;top:0}tr:hover td{background:#fafbff}.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:750;background:#eef2ff;color:#334ccf}.badge.ok{background:#dcfce7;color:#166534}.badge.bad{background:#fee2e2;color:#991b1b}.badge.warn{background:#fef3c7;color:#92400e}.hidden{display:none!important}.muted{color:var(--muted)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.truncate{max-width:440px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.drawer{position:fixed;inset:0 0 0 auto;width:min(760px,96vw);background:#fff;border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(15,23,42,.18);transform:translateX(105%);transition:.22s;z-index:10;display:flex;flex-direction:column}.drawer.open{transform:none}.drawer-head{padding:18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.drawer-body{padding:18px;overflow:auto}.backdrop{position:fixed;inset:0;background:rgba(15,23,42,.25);z-index:9;display:none}.backdrop.open{display:block}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-grid .full{grid-column:1/-1}textarea{width:100%;min-height:160px;resize:vertical}.chat{display:grid;gap:10px}.msg{padding:12px;border-radius:14px;border:1px solid var(--line);background:#f9fafb}.msg.user{background:#eef2ff}.msg.assistant{background:#f0fdf4}.toast{position:fixed;right:20px;bottom:20px;background:#111827;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);z-index:20}.logline{padding:10px 12px;border-bottom:1px solid var(--line);font-family:ui-monospace,monospace;font-size:12px;white-space:pre-wrap}.logline.ERROR,.logline.CRITICAL{background:#fff1f2}.logline.WARNING{background:#fffbeb}.mgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;padding:18px}.mcard{border:1px solid var(--line);border-radius:16px;padding:18px}.mcard h3{margin:0 0 4px}.mcard .cur{font-size:13px;color:var(--muted);margin-bottom:12px}.mopts{display:flex;gap:10px;flex-wrap:wrap}.mopt{border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:700;background:#fff}.mopt.active{border-color:var(--brand);background:#eef2ff;color:#334ccf}.mnote{margin:0 18px 18px;padding:12px 14px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:13px}@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cards{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.mgrid{grid-template-columns:1fr}}@media(max-width:620px){.cards{grid-template-columns:1fr}.main{padding:14px}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">🎓</div><div><b>TeacherGen</b><span>Панель управления</span></div></div>
    <nav class="nav" id="nav">
      <button class="active" data-view="dashboard">📊 Дашборд</button><button data-view="users">👥 Пользователи</button><button data-view="shifts">🗓️ Смены</button><button data-view="departments">🏢 Департаменты</button><button data-view="students">🧒 Ученики</button><button data-view="questions">❓ Вопросы</button><button data-view="answers">📝 Ответы</button><button data-view="reports">📄 Отчёты и переписки</button><button data-view="models">🧠 Нейросети</button><button data-view="logs">🧯 Логи</button>
    </nav>
  </aside>
  <main class="main">
    <div class="top"><div><h1 id="title">Дашборд</h1><p id="subtitle">Сводка по боту, сменам, отчётам и перепискам</p></div><div class="actions"><button class="btn secondary" onclick="refresh()">Обновить</button><a class="btn" href="/health" target="_blank" style="text-decoration:none">Health</a></div></div>
    <section id="view"></section>
  </main>
</div>
<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div class="drawer-head"><div><b id="drawerTitle">Детали</b><div class="muted" id="drawerSub"></div></div><button class="btn secondary" onclick="closeDrawer()">Закрыть</button></div><div class="drawer-body" id="drawerBody"></div></aside>
<script>
const state={view:'dashboard',shifts:[],departments:[]};
const $=s=>document.querySelector(s); const esc=v=>String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const pack=o=>encodeURIComponent(JSON.stringify(o)); const row=s=>JSON.parse(decodeURIComponent(s));
async function api(path,opt={}){const r=await fetch('/admin/api'+path,{headers:{'Content-Type':'application/json'},...opt}); if(!r.ok) throw new Error(await r.text()); return r.json();}
function toast(t){const e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2600)}
function setView(v){state.view=v;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));refresh()}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>setView(b.dataset.view));
async function preload(){state.shifts=await api('/shifts');state.departments=await api('/departments')}
function setHead(t,s){$('#title').textContent=t;$('#subtitle').textContent=s}
function table(cols,rows){return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${typeof c[1]==='function'?c[1](r):esc(r[c[1]])}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" class="muted">Нет данных</td></tr>`}</tbody></table></div>`}
function panel(title,body,tools=''){return `<div class="panel"><div class="panel-head"><h2>${title}</h2></div>${tools?`<div class="toolbar">${tools}</div>`:''}${body}</div>`}
async function refresh(){try{await preload();({dashboard:dash,users,shifts,departments,students,questions,answers,reports,models,logs}[state.view])()}catch(e){console.error(e);toast('Ошибка загрузки: '+e.message)}}
async function dash(){setHead('Дашборд','Ключевая статистика и последние отчёты');const d=await api('/overview');const c=d.cards;$('#view').innerHTML=`<div class="grid cards">${[['Пользователи',c.users_total],['Активные',c.users_active],['Активные смены',c.shifts_active],['Ученики',c.students_total],['Ответы',c.answers_total],['Отчёты',c.reports_total],['Финализировано',c.reports_finalized],['Сообщений правок',c.revisions_total]].map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="metric">${x[1]}</div></div>`).join('')}</div>`+panel('Последние отчёты',table([['ID','id'],['Ученик','student_name'],['Смена','shift_name'],['Статус',r=>r.is_finalized?'<span class="badge ok">готов</span>':'<span class="badge warn">черновик</span>'],['Правки','revision_count'],['Создан','created_at']],d.latest_reports));}
async function users(){setHead('Пользователи','Роли, доступ и активность');$('#view').innerHTML=panel('Пользователи','<div id="tbl"></div>',`<input class="input" id="q" placeholder="Поиск ФИО / username"><button class="btn" onclick="usersLoad()">Найти</button>`);usersLoad()}
async function usersLoad(){const rows=await api('/users?q='+encodeURIComponent($('#q')?.value||''));$('#tbl').innerHTML=table([['ID',r=>`<span class="mono">${r.id}</span>`],['Имя','full_name'],['Username',r=>r.username?'@'+esc(r.username):'—'],['Роль',r=>`<span class="badge">${r.role}</span>`],['Доступ',r=>r.is_active?'<span class="badge ok">активен</span>':'<span class="badge bad">выключен</span>'],['Действия',r=>`<button class="btn secondary" onclick="editUser(row('${pack(r)}'))">Править</button>`]],rows)}
async function shifts(){setHead('Смены','Даты и активность смен');const rows=await api('/shifts');$('#view').innerHTML=panel('Смены',table([['ID','id'],['Название','name'],['Начало','start_date'],['Конец','end_date'],['Статус',r=>r.is_active?'<span class="badge ok">активна</span>':'<span class="badge bad">архив</span>'],['Действия',r=>`<button class="btn secondary" onclick="editShift(row('${pack(r)}'))">Править</button>`]],rows))}
async function departments(){setHead('Департаменты','Контекст смены и состав департаментов');const rows=await api('/departments');$('#view').innerHTML=panel('Департаменты',table([['ID','id'],['Смена','shift_name'],['Департамент',r=>`<span style="color:#${r.hex}">●</span> ${r.emoji} ${esc(r.name)}`],['Ученики','students_count'],['Контекст',r=>r.shift_context?'<span class="badge ok">есть</span>':'<span class="badge warn">пусто</span>'],['Действия',r=>`<button class="btn secondary" onclick="editContext(row('${pack(r)}'))">Контекст</button>`]],rows))}
async function students(){setHead('Ученики','Прогресс заполнения, отчёты и привязки');$('#view').innerHTML=panel('Ученики','<div id="tbl"></div>',filters()+`<input class="input" id="q" placeholder="Поиск ученика"><button class="btn" onclick="studentsLoad()">Показать</button>`);studentsLoad()}
function filters(){return `<select class="select" id="shift_id"><option value="">Все смены</option>${state.shifts.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select><select class="select" id="department_id"><option value="">Все департаменты</option>${state.departments.map(d=>`<option value="${d.id}">${d.department_number}. ${esc(d.name)} · ${esc(d.shift_name)}</option>`).join('')}</select>`}
async function studentsLoad(){let p=new URLSearchParams();['q','shift_id','department_id'].forEach(id=>{let v=$('#'+id)?.value;if(v)p.set(id,v)});const rows=await api('/students?'+p);$('#tbl').innerHTML=table([['ID','id'],['ФИО','full_name'],['Смена','shift_name'],['Департамент','department_name'],['Позиция','position'],['Ответов','answered_count'],['Отчёт',r=>r.has_finalized_report?'<span class="badge ok">готов</span>':(r.reports_count?'<span class="badge warn">черновик</span>':'—')],['Действия',r=>`<button class="btn secondary" onclick="editStudent(row('${pack(r)}'))">Править</button><button class="btn secondary" onclick="openAnswers(${r.id})">Ответы</button>`]],rows)}
async function questions(){setHead('Вопросы','Анкета для педагогов');const rows=await api('/questions');$('#view').innerHTML=panel('Вопросы',table([['№','question_number'],['Блок','block_title'],['Вопрос',r=>`<div class="truncate">${esc(r.question_text)}</div>`],['Активен',r=>r.is_active?'<span class="badge ok">да</span>':'<span class="badge bad">нет</span>'],['Действия',r=>`<button class="btn secondary" onclick="editQuestion(row('${pack(r)}'))">Править</button>`]],rows))}
async function answers(){setHead('Ответы','Все ответы и расшифровки голосовых');$('#view').innerHTML=panel('Ответы','<div id="tbl"></div>',`<input class="input" id="q" placeholder="Поиск по ученику/ответу/вопросу"><button class="btn" onclick="answersLoad()">Найти</button>`);answersLoad()}
async function answersLoad(studentId=''){let q=$('#q')?.value||'';const rows=await api(`/answers?q=${encodeURIComponent(q)}${studentId?'&student_id='+studentId:''}`);$('#tbl').innerHTML=table([['ID','id'],['Ученик','student_name'],['Вопрос',r=>`№${r.question_number}: <span class="muted">${esc(r.question_text).slice(0,100)}</span>`],['Ответ',r=>`<div class="truncate">${esc(r.answer_text)}</div>`],['Кто менял','teacher_name'],['Дата',r=>r.updated_at||r.created_at],['Действия',r=>`<button class="btn secondary" onclick="editAnswer(row('${pack(r)}'))">Править</button>`]],rows)}
async function reports(){setHead('Отчёты и переписки','Тексты отчётов и revision_history как чат');$('#view').innerHTML=panel('Отчёты','<div id="tbl"></div>',`<input class="input" id="q" placeholder="Поиск"><select class="select" id="finalized"><option value="">Любой статус</option><option value="true">Финализирован</option><option value="false">Черновик</option></select><button class="btn" onclick="reportsLoad()">Показать</button>`);reportsLoad()}
async function reportsLoad(){let p=new URLSearchParams();let q=$('#q')?.value, f=$('#finalized')?.value;if(q)p.set('q',q);if(f)p.set('finalized',f);const rows=await api('/reports?'+p);$('#tbl').innerHTML=table([['ID','id'],['Ученик','student_name'],['Смена','shift_name'],['Автор','teacher_name'],['Статус',r=>r.is_finalized?'<span class="badge ok">готов</span>':'<span class="badge warn">черновик</span>'],['Правки','revision_count'],['Текст',r=>`<div class="truncate">${esc(r.generated_text_preview)}</div>`],['Действия',r=>`<button class="btn secondary" onclick="openReport(${r.id})">Открыть</button>`]],rows)}
const MODEL_AREAS={generation:{title:'Итоговый отчёт',desc:'Генерация и правки педагогического отчёта на ребёнка'},context:{title:'Контекст смены',desc:'Оформление и правки контекста смены департамента'}};
async function models(){setHead('Нейросети','Быстрое переключение LLM для генерации');const d=await api('/models');renderModels(d)}
function renderModels(d){const cards=Object.entries(MODEL_AREAS).map(([area,meta])=>{const a=d.areas[area];const opts=d.options.map(o=>`<button class="mopt ${o.key===a.choice?'active':''}" onclick="setModel('${area}','${o.key}')">${esc(o.label)}</button>`).join('');return `<div class="mcard"><h3>${meta.title}</h3><div class="cur">${esc(meta.desc)}<br>Сейчас: <b>${esc(d.options.find(o=>o.key===a.choice)?.label||a.choice)}</b> <span class="mono">(${esc(a.model_id)})</span></div><div class="mopts">${opts}</div></div>`}).join('');$('#view').innerHTML=panel('Выбор нейросети','<div class="mgrid">'+cards+'</div>'+`<div class="mnote">🎙️ Правки расшифровок Whisper всегда выполняются на Gemini (<span class="mono">${esc(d.whisper_clean_model)}</span>) и не переключаются.</div>`)}
async function setModel(area,choice){try{const d=await api('/models',{method:'PATCH',body:JSON.stringify({area,choice})});toast('Нейросеть обновлена');renderModels(d)}catch(e){toast('Ошибка: '+e.message)}}
async function logs(){setHead('Логи','Последние записи текущего процесса bot');$('#view').innerHTML=panel('Логи','<div id="logbox"></div>',`<select class="select" id="level"><option value="">Все</option><option>ERROR</option><option>WARNING</option><option>INFO</option></select><button class="btn" onclick="logsLoad()">Обновить</button>`);logsLoad()}
async function logsLoad(){const rows=await api('/logs?level='+encodeURIComponent($('#level')?.value||''));$('#logbox').innerHTML=rows.map(l=>`<div class="logline ${l.level}"><b>${esc(l.level)}</b> <span class="muted">${esc(l.created_at)} ${esc(l.logger)}</span>\n${esc(l.message)}</div>`).join('')||'<div class="logline muted">Пока нет записей</div>'}
function openDrawer(t,s,b){$('#drawerTitle').textContent=t;$('#drawerSub').textContent=s||'';$('#drawerBody').innerHTML=b;$('#drawer').classList.add('open');$('#backdrop').classList.add('open')}function closeDrawer(){$('#drawer').classList.remove('open');$('#backdrop').classList.remove('open')}
function form(fields,onSave){openDrawer('Редактирование','Измените нужные поля',`<div class="form-grid">${fields.map(f=>`<label class="${f.full?'full':''}"><div class="label">${f.label}</div>${f.type==='textarea'?`<textarea id="f_${f.name}">${esc(f.value)}</textarea>`:f.type==='select'?`<select class="select" id="f_${f.name}">${f.options}</select>`:`<input class="input" id="f_${f.name}" type="${f.type||'text'}" value="${esc(f.value)}">`}</label>`).join('')}</div><p><button class="btn" id="saveBtn">Сохранить</button></p>`);$('#saveBtn').onclick=onSave}
const val=n=>$('#f_'+n).value;
function editUser(r){form([{name:'full_name',label:'ФИО',value:r.full_name},{name:'username',label:'Username',value:r.username||''},{name:'role',label:'Роль',type:'select',options:`<option ${r.role==='teacher'?'selected':''}>teacher</option><option ${r.role==='admin'?'selected':''}>admin</option>`},{name:'is_active',label:'Активен',type:'select',options:`<option value="true" ${r.is_active?'selected':''}>да</option><option value="false" ${!r.is_active?'selected':''}>нет</option>`}],async()=>{await api('/users/'+r.id,{method:'PATCH',body:JSON.stringify({full_name:val('full_name'),username:val('username')||null,role:val('role'),is_active:val('is_active')==='true'})});toast('Сохранено');closeDrawer();usersLoad()})}
function editShift(r){form([{name:'name',label:'Название',value:r.name,full:true},{name:'start_date',label:'Начало',type:'date',value:r.start_date},{name:'end_date',label:'Конец',type:'date',value:r.end_date},{name:'is_active',label:'Активна',type:'select',options:`<option value="true" ${r.is_active?'selected':''}>да</option><option value="false" ${!r.is_active?'selected':''}>нет</option>`}],async()=>{await api('/shifts/'+r.id,{method:'PATCH',body:JSON.stringify({name:val('name'),start_date:val('start_date'),end_date:val('end_date'),is_active:val('is_active')==='true'})});toast('Сохранено');closeDrawer();shifts()})}
function editContext(r){form([{name:'shift_context',label:`${r.name} · ${r.shift_name}`,type:'textarea',value:r.shift_context,full:true}],async()=>{await api('/departments/'+r.id+'/context',{method:'PATCH',body:JSON.stringify({shift_context:val('shift_context')})});toast('Контекст сохранён');closeDrawer();departments()})}
function editStudent(r){form([{name:'full_name',label:'ФИО',value:r.full_name,full:true},{name:'position',label:'Позиция',type:'number',value:r.position||''},{name:'department_id',label:'Департамент',type:'select',options:state.departments.map(d=>`<option value="${d.id}" ${d.id===r.department_id?'selected':''}>${d.department_number}. ${esc(d.name)} · ${esc(d.shift_name)}</option>`).join('')}],async()=>{await api('/students/'+r.id,{method:'PATCH',body:JSON.stringify({full_name:val('full_name'),position:val('position')?Number(val('position')):null,department_id:Number(val('department_id'))})});toast('Сохранено');closeDrawer();studentsLoad()})}
function editQuestion(r){form([{name:'question_number',label:'Номер',type:'number',value:r.question_number},{name:'block_title',label:'Блок',value:r.block_title||''},{name:'question_text',label:'Текст вопроса',type:'textarea',value:r.question_text,full:true},{name:'is_active',label:'Активен',type:'select',options:`<option value="true" ${r.is_active?'selected':''}>да</option><option value="false" ${!r.is_active?'selected':''}>нет</option>`}],async()=>{await api('/questions/'+r.id,{method:'PATCH',body:JSON.stringify({question_number:Number(val('question_number')),block_title:val('block_title'),question_text:val('question_text'),is_active:val('is_active')==='true'})});toast('Сохранено');closeDrawer();questions()})}
function editAnswer(r){form([{name:'answer_text',label:'Ответ',type:'textarea',value:r.answer_text||'',full:true},{name:'raw_audio_transcription',label:'Raw audio transcription',type:'textarea',value:r.raw_audio_transcription||'',full:true}],async()=>{await api('/answers/'+r.id,{method:'PATCH',body:JSON.stringify({answer_text:val('answer_text'),raw_audio_transcription:val('raw_audio_transcription')})});toast('Ответ сохранён');closeDrawer();answersLoad()})}
async function openAnswers(id){setView('answers');setTimeout(()=>answersLoad(id),100)}
async function openReport(id){const r=await api('/reports/'+id);openDrawer('Отчёт #'+id,`${r.student_name} · ${r.shift_name}`,`<div class="form-grid"><label class="full"><div class="label">Текст отчёта</div><textarea id="reportText" style="min-height:300px">${esc(r.generated_text)}</textarea></label><label><div class="label">Статус</div><select class="select" id="reportFinal"><option value="true" ${r.is_finalized?'selected':''}>финализирован</option><option value="false" ${!r.is_finalized?'selected':''}>черновик</option></select></label></div><p><button class="btn" onclick="saveReport(${id})">Сохранить отчёт</button></p><h3>Переписка / правки</h3><div class="chat">${r.history.map(m=>`<div class="msg ${m.role}"><b>${esc(m.role)}</b> <span class="muted">${esc(m.created_at)}</span><br>${esc(m.content).replace(/\n/g,'<br>')}</div>`).join('')||'<p class="muted">Истории правок пока нет</p>'}</div>`)}
async function saveReport(id){await api('/reports/'+id,{method:'PATCH',body:JSON.stringify({generated_text:$('#reportText').value,is_finalized:$('#reportFinal').value==='true'})});toast('Отчёт сохранён');closeDrawer();reportsLoad()}
refresh();
</script>
</body>
</html>

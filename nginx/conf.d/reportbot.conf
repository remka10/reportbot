server {
    listen 80;
    server_name teachergen.ru www.teachergen.ru;

    location ~* /wp-(admin|login|config|includes|content|cron) { return 444; }
    location ~* /cgi-bin/ { return 444; }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name teachergen.ru www.teachergen.ru;

    ssl_certificate     /etc/letsencrypt/live/teachergen.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teachergen.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25M;

    location ~* /wp-(admin|login|config|includes|content|cron) { return 444; }
    location ~* /cgi-bin/ { return 444; }

    location / {
        proxy_pass http://bot:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
